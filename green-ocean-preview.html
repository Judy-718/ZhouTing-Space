<!doctype html>
<html lang="zh-Hans">
  <head>

      <img class="cursor__avatar is-apple" src="./assets/cursor-apple-0.svg" alt="" />

    </div>

    <main class="dock wrap">
      <aside class="dock__nav">
        <div class="dock__brand">
          <a class="dock__title" href="./index.html" data-cursor="Home">ZhouTing.Space</a>
        </div>

        <nav class="dock__links" aria-label="Site">
          <a href="./about.html" data-transition="wipe" data-accent="#FFB86B" data-cursor="About">About me</a>

          <div class="dock__group">
            <a href="./project-preview.html" data-transition="wipe" data-accent="#B7FF5A" data-cursor="Project">Project</a>
            <div class="dock__list" aria-label="Project list">
              <a href="./project-preview.html" data-transition="wipe" data-accent="#B7FF5A" data-cursor="Open">1. What is Buddha？</a>
              <a href="./empty-house-preview.html" data-transition="shard" data-accent="#7C6CFF" data-cursor="Open">2. Empty House</a>
              <a href="./fluid-preview.html" data-transition="iris" data-accent="#FF4BD8" data-cursor="Open">3. The Fluid 1.5㎡</a>
              <a href="./green-ocean-preview.html" class="is-active" data-cursor="Open">4. Green Ocean</a>
            </div>
          </div>

          <a href="./photo.html" data-transition="pulse" data-accent="#7C6CFF" data-cursor="Photo">photography</a>
        </nav>
      </aside>

      <section class="dock__stage projPrev" aria-label="Project preview">
        <header class="projPrev__head">
          <div class="projPrev__crumb">Project</div>
          <div class="projPrev__title">Green Ocean</div>
          <div class="projPrev__year">2025</div>

        <div

          data-images="./assets/projects/p4/01.jpg,./assets/projects/p4/02.jpg,./assets/projects/p4/03.jpg,./assets/projects/p4/04.jpg,./assets/projects/p4/05.jpg,./assets/projects/p4/06.jpg,./assets/projects/p4/07.jpg,./assets/projects/p4/08.jpg"

        <div class="projPrev__caption" data-only-first="1">

    <div class="transition" aria-hidden="true">
      <div class="transition__layer"></div>
      <div class="transition__grain"></div>
