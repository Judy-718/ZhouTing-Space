<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Empty House · Portfolio" />
    <title>Empty House · Portfolio</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-accent="#7C6CFF" data-cursor-stage="2">
    <div class="noise" aria-hidden="true"></div>
    <div class="cursor" aria-hidden="true">
      <div class="cursor__core"></div>
      <img class="cursor__avatar is-apple" src="../assets/cursor-apple-0.svg" alt="" />
      <div class="cursor__label"></div>
    </div>

    <header class="top">
      <a class="brand" href="../" data-transition="wipe" data-accent="#7C6CFF" data-cursor="Home">
        <span class="brand__dot" aria-hidden="true"></span>
        <span class="brand__text">你的名字</span>
      </a>

      <nav class="nav">
        <a class="nav__link" href="../#work" data-transition="wipe" data-accent="#7C6CFF" data-cursor="Work">Work</a>
        <a class="nav__link" href="../about.html" data-transition="pulse" data-accent="#FFB86B" data-cursor="About"
          >About</a
        >
        <a class="nav__link" href="mailto:you@email.com" data-cursor="Email">Email</a>
      </nav>
    </header>

    <main class="wrap project">
      <section class="project__head">
        <h1 class="project__title">Empty House</h1>
        <div class="project__hint">Villa / hollow scene / quiet weird</div>
      </section>

      <p class="project__text">
        你可以把这个项目做得更“作品化”：不解释太多，用 2–3 个关键词（比如：噪点、拉伸、断裂、回声）当作标题就够了。
      </p>

      <section class="project__grid" aria-label="Gallery">
        <div class="shot span-8" data-label="Frame 01"></div>
        <div class="shot span-4" data-label="Note"></div>
        <div class="shot span-12" data-label="Hero"></div>
        <div class="shot span-6" data-label="Frame 02"></div>
        <div class="shot span-6" data-label="Frame 03"></div>
      </section>

      <footer class="foot">
        <div class="foot__left">
          <span class="foot__tag">© <span data-year></span> 你的名字</span>
        </div>
        <div class="foot__right">
          <a class="foot__link" href="./project-03.html" data-transition="shard" data-accent="#FF4BD8" data-cursor="Next"
            >Next</a
          >
        </div>
      </footer>
    </main>

    <div class="transition" aria-hidden="true">
      <div class="transition__layer"></div>
      <div class="transition__grain"></div>
    </div>

    <script src="../app.js" defer></script>
  </body>
</html>
