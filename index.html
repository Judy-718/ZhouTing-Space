<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="个人作品集｜平面设计" />
    <title>Portfolio</title>
    <link rel="preload" href="./assets/avatar.svg" as="image" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-cursor-stage="0" data-home-bounce="1">
    <div class="noise" aria-hidden="true"></div>
    <div class="cursor" aria-hidden="true">
      <div class="cursor__core"></div>
      <img class="cursor__avatar is-apple" src="./assets/cursor-apple-0.svg" alt="" />
      <div class="cursor__label"></div>
    </div>
    <main class="homeDock wrap" data-home-drop="1">
      <aside class="homeDock__nav" aria-label="Navigation">
        <a class="homeDock__brand" href="./index.html" data-cursor="Home">ZhouTing.Space</a>
        <nav class="homeDock__links">
          <a href="./about.html" data-transition="wipe" data-accent="#FFB86B" data-cursor="About">About me</a>
          <a href="./projects.html" data-transition="wipe" data-accent="#B7FF5A" data-cursor="Project">Project</a>
          <a href="./photo.html" data-transition="pulse" data-accent="#7C6CFF" data-cursor="Photo">photography</a>
        </nav>
      </aside>

      <section class="homeDock__stage" aria-label="Home apples">
        <div class="homeDrop">
          <div class="homeDrop__text tL">Starting from an apple</div>
          <div class="homeDrop__text tR">Starting from an apple</div>

          <img class="dropApple mid" src="./assets/projects/apple-full.png" alt="" aria-hidden="true" draggable="false" />
          <img class="dropApple bot" src="./assets/projects/apple-full.png" alt="" aria-hidden="true" draggable="false" />
        </div>
      </section>
    </main>

    <div class="transition" aria-hidden="true">
      <div class="transition__layer"></div>
      <div class="transition__grain"></div>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
